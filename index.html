<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HackNova 2025 – Build The Future</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#7C3AED;--primary-light:#A78BFA;--primary-dark:#4C1D95;
  --accent:#F43F5E;--accent2:#06B6D4;--accent3:#FBBF24;
  --bg:#08080F;--bg2:#0F0F1A;--bg3:#171724;--bg4:#1E1E30;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(124,58,237,0.4);
  --text:#F0EEFF;--text2:#9D8EC8;--text3:#5C5480;
  --success:#10B981;--warning:#F59E0B;--error:#EF4444;
  --r:12px;--r2:20px;--r3:32px;
  --font-head:'Bricolage Grotesque',sans-serif;--font-body:'Outfit',sans-serif;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--font-body)}
input,textarea,select{font-family:var(--font-body)}
h1,h2,h3,h4,h5{font-family:var(--font-head)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
#root{min-height:100vh}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.3)}50%{box-shadow:0 0 50px rgba(124,58,237,0.7)}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes countPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes orb{0%,100%{transform:scale(1) translate(0,0)}33%{transform:scale(1.05) translate(20px,-15px)}66%{transform:scale(0.97) translate(-10px,20px)}}
@keyframes borderGlow{0%,100%{border-color:rgba(124,58,237,0.3)}50%{border-color:rgba(124,58,237,0.8)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes gridFade{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes blink{50%{opacity:0}}
@keyframes ripple{from{transform:scale(0);opacity:1}to{transform:scale(4);opacity:0}}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.animate-fadeUp{animation:fadeUp .6s ease forwards}
.animate-float{animation:float 4s ease-in-out infinite}
.animate-float2{animation:float2 5s ease-in-out infinite}
.animate-glow{animation:glow 3s ease-in-out infinite}
.animate-pulse{animation:pulse 2s ease-in-out infinite}
.animate-spin-slow{animation:spinSlow 20s linear infinite}
.animate-orb{animation:orb 8s ease-in-out infinite}
.animate-gradient{background-size:300% 300%;animation:gradientShift 5s ease infinite}

/* GLASS */
.glass{background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(12px)}
.glass2{background:var(--glass2);border:1px solid var(--border2);backdrop-filter:blur(12px)}
.card-hover{transition:all .3s ease}
.card-hover:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 40px rgba(124,58,237,0.2)}

/* GRADIENT TEXT */
.grad{background:linear-gradient(135deg,#C084FC,#818CF8,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad2{background:linear-gradient(135deg,#F43F5E,#FBBF24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad3{background:linear-gradient(135deg,#10B981,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:var(--r);font-size:14px;font-weight:600;border:none;transition:all .25s;white-space:nowrap;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:0.06}
.btn-primary{background:linear-gradient(135deg,var(--primary),#9F67FF);color:#fff;box-shadow:0 4px 24px rgba(124,58,237,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.55)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid rgba(255,255,255,0.12)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary-light)}
.btn-ghost{background:transparent;color:var(--text2);border:none;padding:10px 16px}
.btn-ghost:hover{color:var(--text);background:var(--glass)}
.btn-accent{background:linear-gradient(135deg,#F43F5E,#FB7185);color:#fff;box-shadow:0 4px 20px rgba(244,63,94,0.3)}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-xs{padding:6px 12px;font-size:12px}
.btn-danger{background:rgba(239,68,68,0.12);color:#EF4444;border:1px solid rgba(239,68,68,0.25)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--primary-light)}
.tag{padding:3px 10px;background:rgba(124,58,237,0.12);border-radius:999px;font-size:11px;font-weight:600;color:var(--primary-light)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase}
.chip-blue{background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.25);color:#06B6D4}
.chip-green{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#10B981}
.chip-orange{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:#F59E0B}
.chip-red{background:rgba(244,63,94,0.12);border:1px solid rgba(244,63,94,0.25);color:#F43F5E}

/* FORM */
.input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;width:100%}
.input:focus{border-color:var(--primary)}
.input.err{border-color:var(--error)}
.input::placeholder{color:var(--text3)}
.input option{background:var(--bg2)}
.label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.form-err{font-size:12px;color:var(--error);margin-top:4px}

/* NOTIF */
.notif{padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:flex-start;gap:12px;animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.notif-success{border-left:3px solid var(--success)}
.notif-error{border-left:3px solid var(--error)}
.notif-info{border-left:3px solid var(--primary)}
.notif-warning{border-left:3px solid var(--warning)}

/* HERO GRID BG */
.grid-bg{background-image:linear-gradient(rgba(124,58,237,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.07) 1px,transparent 1px);background-size:50px 50px}

/* TRACK CARD */
.track-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:28px;transition:all .3s;position:relative;overflow:hidden;cursor:pointer}
.track-card:hover{border-color:var(--primary);transform:translateY(-6px);box-shadow:0 20px 60px rgba(124,58,237,0.2)}
.track-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,0.05),transparent);opacity:0;transition:opacity .3s}
.track-card:hover::before{opacity:1}

/* PRIZE */
.prize-card{border-radius:var(--r2);padding:32px;text-align:center;border:1px solid var(--border);transition:all .35s;position:relative;overflow:hidden}
.prize-card:hover{transform:translateY(-8px)}
.prize-1st{background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(245,158,11,0.04));border-color:rgba(251,191,36,0.25);animation:borderGlow 3s ease-in-out infinite}
.prize-2nd{background:linear-gradient(135deg,rgba(148,163,184,0.06),rgba(100,116,139,0.03));border-color:rgba(148,163,184,0.2)}
.prize-3rd{background:linear-gradient(135deg,rgba(251,146,60,0.08),rgba(234,88,12,0.04));border-color:rgba(251,146,60,0.2)}

/* TIMELINE */
.tl-line{position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--primary),var(--accent2),transparent)}
.tl-dot{position:absolute;left:-49px;top:4px;width:20px;height:20px;border-radius:50%;border:3px solid var(--bg);box-shadow:0 0 0 3px currentColor}

/* FAQ */
.faq-item{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.faq-item.open{border-color:var(--primary)}

/* SCROLL */
.section-fade{opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease}
.section-fade.visible{opacity:1;transform:translateY(0)}

/* MARQUEE */
.marquee-track{display:flex;gap:40px;animation:marquee 25s linear infinite}
.marquee-track:hover{animation-play-state:paused}

/* NOISE OVERLAY */
.noise::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:36px;width:100%;max-width:420px;position:relative;animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto}
.modal-box::-webkit-scrollbar{width:4px}

/* SPONSOR LOGO */
.sponsor-logo{padding:16px 28px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);font-family:var(--font-head);font-weight:700;font-size:18px;color:var(--text3);transition:all .3s;white-space:nowrap}
.sponsor-logo:hover{color:var(--text);border-color:var(--primary);background:rgba(124,58,237,0.08)}

/* MENTOR CARD */
.mentor-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:24px;text-align:center;transition:all .3s}
.mentor-card:hover{border-color:var(--primary);transform:translateY(-4px);box-shadow:0 16px 40px rgba(124,58,237,0.15)}
.mentor-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px;font-family:var(--font-head);font-weight:800;border:2px solid var(--border2)}

/* DASHBOARD */
.dash-nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;background:none;border:none;width:100%;text-align:left}
.dash-nav-item:hover{background:var(--glass2);color:var(--text)}
.dash-nav-item.active{background:rgba(124,58,237,0.15);color:var(--primary-light)}
.dash-panel{animation:fadeUp .3s ease}

/* STAT NUM */
.stat-num{font-family:var(--font-head);font-size:48px;font-weight:800;line-height:1}

/* PROGRESS BAR */
.progress-bar{height:6px;border-radius:999px;background:var(--bg3);overflow:hidden}
.progress-fill{height:100%;border-radius:999px;transition:width 1.5s ease}

/* SCHEDULE */
.schedule-item{display:flex;gap:16px;padding:14px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);transition:all .2s}
.schedule-item:hover{border-color:var(--primary);background:var(--glass2)}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);transition:all .2s}
.lb-row:hover{border-color:var(--primary);transform:translateX(4px)}
.lb-1{border-left:3px solid #FBBF24;background:rgba(251,191,36,0.05)}
.lb-2{border-left:3px solid #94A3B8;background:rgba(148,163,184,0.05)}
.lb-3{border-left:3px solid #FB923C;background:rgba(251,146,60,0.05)}

/* RESPONSIVE NAV */
@media(max-width:768px){
  .desktop-nav{display:none}
  .mobile-nav-btn{display:flex!important}
}
@media(min-width:769px){
  .mobile-nav-btn{display:none!important}
}
</style>
</head>

// ─── PARTICLE CANVAS ──────────────────────────────────────
const Particles = () => {
  const ref = useRef();
  useEffect(()=>{
    const c = ref.current;
    if(!c) return;
    const ctx = c.getContext('2d');
    let pts = [], W, H, raf;
    const init = () => {
      W = c.width = c.offsetWidth; H = c.height = c.offsetHeight;
      pts = Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.5+.5}));
    };
    init();
    window.addEventListener('resize',init);
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>W) p.vx*=-1;
        if(p.y<0||p.y>H) p.vy*=-1;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(167,139,250,0.5)'; ctx.fill();
      });
      pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d<110){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(124,58,237,${.12*(1-d/110)})`;ctx.lineWidth=.6;ctx.stroke();}
      }));
      raf = requestAnimationFrame(draw);
    };
    draw();
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',init);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',zIndex:0}}/>;
};

// ─── COUNTDOWN ────────────────────────────────────────────
const Countdown = () => {
  const [time,setTime] = useState({d:'--',h:'--',m:'--',s:'--'});
  useEffect(()=>{
    const target = new Date('2025-07-18T09:00:00+05:30').getTime();
    const tick = () => {
      const diff = target - Date.now();
      if(diff<=0){setTime({d:'00',h:'00',m:'00',s:'00'});return;}
      setTime({
        d:String(Math.floor(diff/86400000)).padStart(2,'0'),
        h:String(Math.floor(diff%86400000/3600000)).padStart(2,'0'),
        m:String(Math.floor(diff%3600000/60000)).padStart(2,'0'),
        s:String(Math.floor(diff%60000/1000)).padStart(2,'0')
      });
    };
    tick(); const id=setInterval(tick,1000); return ()=>clearInterval(id);
  },[]);
  const Unit = ({val,lab}) => (
    <div style={{background:'rgba(255,255,255,0.05)',borderRadius:'12px',padding:'16px 8px',textAlign:'center',flex:1}}>
      <div style={{fontFamily:'var(--font-head)',fontSize:'clamp(28px,4vw,40px)',fontWeight:800,color:'var(--primary-light)',lineHeight:1}}>{val}</div>
      <div style={{fontSize:'10px',color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginTop:6}}>{lab}</div>
    </div>
  );
  return (
    <div className="glass animate-glow" style={{borderRadius:'var(--r2)',padding:'28px',textAlign:'center'}}>
      <div style={{fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--text3)',marginBottom:20}}>⏱ Event Starts In</div>
      <div style={{display:'flex',gap:'10px'}}><Unit val={time.d} lab="Days"/><Unit val={time.h} lab="Hours"/><Unit val={time.m} lab="Mins"/><Unit val={time.s} lab="Secs"/></div>
    </div>
  );
};

// ─── SECTION FADE ─────────────────────────────────────────
const useFadeIn = () => {
  const ref = useRef();
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{if(e.isIntersecting){e.target.classList.add('visible');}},{threshold:.1});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[]);
  return ref;
};

// ─── ANIMATED COUNTER ─────────────────────────────────────
const Counter = ({target,suffix=''}) => {
  const [val,setVal] = useState(0);
  const ref = useRef();
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){
        let cur=0; const step=target/60;
        const id=setInterval(()=>{cur=Math.min(cur+step,target);setVal(Math.floor(cur));if(cur>=target)clearInterval(id);},20);
      }
    },{threshold:.3});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[target]);
  return <span ref={ref}>{val}{suffix}</span>;
};

const AuthModal = ({onClose,onLogin,setPage}) => {

  const notif = useNotif();

  const doLogin = () => {
    if(!lEmail||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(lEmail)){setLErr('Valid email required');return;}
    if(!lPass||lPass.length<6){setLErr('Password too short');return;}
    const users = JSON.parse(localStorage.getItem('hn_users')||'[]');
    const found = users.find(u=>u.email===lEmail&&u.pass===lPass);
    if(!found){setLErr('Invalid email or password');return;}
    onLogin({email:found.email,fname:found.fname,lname:found.lname});
    onClose(); notif(`Welcome back, ${found.fname}! 👋`,'success');
  };
  const doSignup = () => {
    if(!sFname){setSErr('Name required');return;}
    if(!sEmail||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(sEmail)){setSErr('Valid email required');return;}
    if(!sPass||sPass.length<6){setSErr('Min 6 characters');return;}
    const users = JSON.parse(localStorage.getItem('hn_users')||'[]');
    if(users.find(u=>u.email===sEmail)){setSErr('Email already registered');return;}
    users.push({fname:sFname,lname:sLname,email:sEmail,pass:sPass});
    localStorage.setItem('hn_users',JSON.stringify(users));
    localStorage.setItem('hn_profile',JSON.stringify({fname:sFname,lname:sLname,email:sEmail,phone:'',github:'',linkedin:'',bio:''}));
    onLogin({email:sEmail,fname:sFname,lname:sLname});

// ─── PAGE: REGISTER ───────────────────────────────────────
// ═══════════════════════════════════════════════════════════
const RegisterPage = ({registrations,setRegistrations,setPage}) => {
  const notif = useNotif();
  const [done,setDone] = useState(false);
  const [form,setForm] = useState({fname:'',lname:'',email:'',phone:'',team:'',track:'',mode:'online',tshirt:'M',github:'',linkedin:''});
  const [errs,setErrs] = useState({});

  const set = (k,v) => setForm(prev=>({...prev,[k]:v}));
  const validate = () => {
    const e={};
    if(!form.fname.trim()) e.fname='First name required';
    if(!form.lname.trim()) e.lname='Last name required';
    if(!form.email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email='Valid email required';
    if(!form.phone||!/^\d{10}$/.test(form.phone)) e.phone='10-digit phone required';
    if(!form.team.trim()) e.team='Team name required';
    setErrs(e); return Object.keys(e).length===0;
  };
  const submit = e => {
    e.preventDefault();
    if(!validate()) return;
    const reg = {...form,id:Date.now(),date:new Date().toLocaleDateString()};
    setRegistrations([...registrations,reg]);
    setDone(true);
    notif('🎉 Registration successful! Welcome to HackNova!','success');
  };

  if(done) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',paddingTop:80}}>
      <div style={{textAlign:'center',maxWidth:500,padding:40}}>
        <div style={{fontSize:72,marginBottom:20,animation:'float 3s ease-in-out infinite'}}>🎉</div>
        <h2 style={{fontFamily:'var(--font-head)',fontSize:32,fontWeight:800,marginBottom:12}}>You're Registered!</h2>
        <p style={{color:'var(--text2)',lineHeight:1.7,marginBottom:32}}>Welcome to HackNova 2025! Check your email for confirmation. We can't wait to see what you build.</p>
        <div style={{display:'flex',gap:12,justifyContent:'center'}}>
          <button className="btn btn-primary" onClick={()=>setPage('home')}>Back to Home</button>
          <button className="btn btn-outline" onClick={()=>setDone(false)}>Register Another</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',paddingTop:'80px'}}>
      {/* HERO */}
      <div style={{background:'linear-gradient(135deg,rgba(124,58,237,0.15),rgba(6,182,212,0.08))',borderBottom:'1px solid var(--border)',padding:'60px 24px',textAlign:'center'}}>
        <span className="badge" style={{marginBottom:12,display:'inline-block'}}>Join 2000+ Hackers</span>
        <h1 style={{fontFamily:'var(--font-head)',fontSize:'clamp(32px,4vw,56px)',fontWeight:800,marginBottom:14}}>Register for <span className="grad">HackNova 2025</span></h1>
        <p style={{color:'var(--text2)',fontSize:16,maxWidth:480,margin:'0 auto'}}>Spots are limited. Secure yours before July 1, 2025.</p>
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'60px 24px',display:'grid',gridTemplateColumns:'1fr 380px',gap:40,alignItems:'start'}}>
        {/* FORM */}
        <div className="glass" style={{borderRadius:'var(--r2)',padding:'36px'}}>
          <h3 style={{fontFamily:'var(--font-head)',fontSize:22,fontWeight:700,marginBottom:6}}>Your Details</h3>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:28}}>Fill in your information to register</p>
          <form onSubmit={submit}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <div>
                <label className="label">First Name *</label>

const TracksPage = ({wishlist,setWishlist,user,onOpenAuth,setPage}) => {
  const notif = useNotif();
  const [filter,setFilter] = useState('all');
  const [search,setSearch] = useState('');
  const [selected,setSelected] = useState(null);

  const filtered = TRACKS.filter(t=>(filter==='all'||t.cat===filter)&&(t.name.toLowerCase().includes(search.toLowerCase())||t.desc.toLowerCase().includes(search.toLowerCase())));

    e?.stopPropagation();
    if(!user){notif('Sign in to wishlist tracks','info');onOpenAuth();return;}
    const track = TRACKS.find(t=>t.id===id);
    const has = wishlist.find(w=>w.id===id);
    if(has){setWishlist(wishlist.filter(w=>w.id!==id));notif(`Removed from wishlist`,'info');}
    else{setWishlist([...wishlist,{id:track.id,name:track.name,icon:track.icon,cat:track.cat}]);notif(`❤️ Added to wishlist`,'success');}

    web3:{problems:['Decentralized identity for the unbanked','On-chain micro-lending platform for rural SMEs','NFT-based land registry system'],stack:['Solidity','Hardhat','Ethers.js','IPFS','The Graph'],resources:['Polygon Mumbai Testnet','Alchemy API','Moralis'],judge:'Arjun Mehta, Blockchain Lead at Polygon'},
    health:{problems:['AI-powered triage for rural health centers','Mental health companion for college students','Real-time epidemic prediction model'],stack:['React Native','Python','FHIR API','TensorFlow Lite'],resources:['AWS Healthcare APIs','Google Health API'],judge:'Dr. Neha Gupta, CTO HealthBridge'},
    green:{problems:['Carbon footprint tracker for supply chains','Smart water conservation for agriculture','EV charging network optimizer'],stack:['IoT','React','Python','InfluxDB','Grafana'],resources:['Azure IoT Hub','Google Maps API'],judge:'Rohan Verma, Founder GreenGrid'},

    social:{problems:['Accessible tech for visually impaired farmers','AI tutor for first-generation college students','Civic complaint resolution platform'],stack:['React','Node.js','Python','Twilio','Firebase'],resources:['Twilio Credits','Firebase Pro','Google Translate API'],judge:'Dev Anand, SWE III Microsoft'},
  };

  return (

      </div>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'48px 24px'}}>
        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap',marginBottom:24}}>
          {['all','tech','health','society','finance'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:'7px 18px',borderRadius:999,background:filter===f?'rgba(124,58,237,0.2)':'var(--glass)',border:`1px solid ${filter===f?'var(--primary)':'var(--border)'}`,fontSize:12,fontWeight:600,color:filter===f?'var(--primary-light)':'var(--text2)',cursor:'pointer',textTransform:'capitalize',transition:'all .2s'}}>

              <div style={{height:t.h,background:`linear-gradient(to top,${t.pos===1?'rgba(251,191,36,0.2)':t.pos===2?'rgba(148,163,184,0.15)':'rgba(251,146,60,0.15)'},transparent)`,border:`1px solid ${t.pos===1?'rgba(251,191,36,0.3)':t.pos===2?'rgba(148,163,184,0.25)':'rgba(251,146,60,0.25)'}`,borderRadius:'10px 10px 0 0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
                <div style={{fontSize:t.pos===1?32:24}}>{medals[t.pos-1]||t.pos}</div>
                <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:800}}>{t.score.toLocaleString()}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>points</div>
              </div>
            </div>
          ))}
        </div>
        {/* Full Leaderboard */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:24}}>
          {['all','AI','Web3','HealthTech','GreenTech','FinTech','Social'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:'6px 14px',borderRadius:999,background:filter===f?'rgba(124,58,237,0.2)':'var(--glass)',border:`1px solid ${filter===f?'var(--primary)':'var(--border)'}`,fontSize:12,fontWeight:600,color:filter===f?'var(--primary-light)':'var(--text2)',cursor:'pointer',transition:'all .2s'}}>
              {f==='all'?'All Tracks':f}
            </button>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map((t,i)=>(
            <div key={t.rank} className={`lb-row ${rankClass(i)}`} style={{animation:`fadeUp .4s ease ${i*.05}s both`}}>
              <div style={{width:32,height:32,borderRadius:'50%',background:'var(--glass2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:i<3?18:13,fontWeight:700,flexShrink:0}}>
                {i<3?medals[i]:t.rank}
              </div>
              <div style={{width:40,height:40,borderRadius:'50%',background:`linear-gradient(135deg,${['#7C3AED,#9F67FF','#F59E0B,#FBBF24','#10B981,#06B6D4','#F43F5E,#FB7185','#06B6D4,#38BDF8','#8B5CF6,#A78BFA','#EC4899,#F43F5E','#F97316,#FBBF24'][i%8]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,fontFamily:'var(--font-head)'}}>
                {t.team[0]}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{t.team}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{t.members} members · {t.track}</div>
              </div>
              <span className="tag" style={{fontSize:11}}>{t.track}</span>
              <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:800,color:i===0?'#FBBF24':i===1?'#94A3B8':i===2?'#FB923C':'var(--text)'}}>{t.score.toLocaleString()}</div>
            </div>
          ))}
        </div>
        <div className="glass" style={{borderRadius:'var(--r)',padding:'14px 18px',marginTop:24,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'#10B981',animation:'pulse 1.5s ease-in-out infinite'}}/>
          <span style={{fontSize:12,color:'var(--text2)'}}>Live · Updates every 30 minutes · Last updated: 2 mins ago</span>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// ─── PAGE: DASHBOARD ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════
const DashboardPage = ({user,setUser,registrations,setRegistrations,wishlist,setWishlist,teams,setTeams,profile,setProfile,setPage}) => {
  const notif = useNotif();
  const [activePanel,setActivePanel] = useState('overview');
  const [newTeam,setNewTeam] = useState({name:'',track:'',desc:''});
  const [pf,setPf] = useState({...profile||{}});

  if(!user) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',paddingTop:80}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:64,marginBottom:16}}>🔒</div>
        <h2 style={{fontFamily:'var(--font-head)',fontSize:28,fontWeight:800,marginBottom:12}}>Sign In Required</h2>
        <p style={{color:'var(--text2)',marginBottom:24}}>Please sign in to access your dashboard.</p>
        <button className="btn btn-primary" onClick={()=>setPage('home')}>Go Back Home</button>
      </div>
    </div>
  );

  const initials = ((user.fname?.[0]||'?')+(user.lname?.[0]||'')).toUpperCase();
  const myRegs = registrations.filter(r=>r.email===user.email);
  const myTeam = teams.find(t=>t.members?.includes(user.email));

  const navItems = [
    {id:'overview',icon:'🏠',label:'Overview'},
    {id:'profile',icon:'👤',label:'My Profile'},
    {id:'registrations',icon:'🎟️',label:'Registrations'},
    {id:'wishlist',icon:'❤️',label:'Wishlist'},
    {id:'teams',icon:'👥',label:'Team Builder'},
    {id:'settings',icon:'⚙️',label:'Settings'},
  ];

  const saveProfile = () => {
    setProfile(pf);
    notif('Profile updated ✓','success');
  };

  const createTeam = () => {
    if(!newTeam.name){notif('Enter a team name','warning');return;}
    if(myTeam){notif('You\'re already in a team','warning');return;}
    const team = {...newTeam,id:Date.now().toString(),leader:user.email,members:[user.email],created:new Date().toLocaleDateString()};
    setTeams([...teams,team]);
    setNewTeam({name:'',track:'',desc:''});
    notif(`Team "${newTeam.name}" created! 🎉`,'success');
  };

  const joinTeam = id => {
    if(myTeam){notif('Already in a team','warning');return;}
    const updated = teams.map(t=>t.id===id?{...t,members:[...t.members,user.email]}:t);
    setTeams(updated);
    notif('Joined team! 🎉','success');
  };

  const removeWish = id => {
    setWishlist(wishlist.filter(w=>w.id!==id));
    notif('Removed from wishlist','info');
  };

  return (
    <div style={{minHeight:'100vh',paddingTop:80}}>
      {/* Header */}
      <div style={{background:'var(--bg2)',borderBottom:'1px solid var(--border)',padding:'28px 0'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{width:60,height:60,borderRadius:'50%',background:'linear-gradient(135deg,var(--primary),#F43F5E)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,fontFamily:'var(--font-head)'}}>{initials}</div>
            <div>
              <div style={{fontFamily:'var(--font-head)',fontSize:22,fontWeight:800}}>{user.fname} {user.lname||''}</div>
              <div style={{fontSize:13,color:'var(--text2)'}}>{user.email}</div>
            </div>
            <span className="chip chip-green" style={{marginLeft:8}}>Active</span>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-outline btn-sm" onClick={()=>setPage('home')}>← Back to Site</button>
            <button className="btn btn-danger btn-sm" onClick={()=>{setUser(null);localStorage.removeItem('hn_user');setPage('home');notif('Logged out! 👋','info');}}>Logout</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'40px 24px',display:'grid',gridTemplateColumns:'220px 1fr',gap:28,alignItems:'start'}}>
        {/* Sidebar */}
        <div className="glass" style={{borderRadius:'var(--r2)',padding:'10px',overflow:'hidden',position:'sticky',top:'90px'}}>
          {navItems.map(item=>(
            <button key={item.id} className={`dash-nav-item ${activePanel===item.id?'active':''}`} onClick={()=>setActivePanel(item.id)}>
              <span style={{fontSize:17,width:24,textAlign:'center'}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        {/* Main */}
        <div>
          {/* OVERVIEW */}
          {activePanel==='overview'&&(
            <div className="dash-panel">
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
                {[['🎟️','Registrations',myRegs.length,'var(--primary-light)'],['❤️','Wishlisted',wishlist.length,'#F43F5E'],['👥','Team Status',myTeam?'✓ Joined':'None','#06B6D4'],['📅','Days Left','111','#FBBF24']].map(([ic,l,v,c])=>(
                  <div key={l} className="glass" style={{borderRadius:'var(--r)',padding:'18px',textAlign:'center'}}>
                    <div style={{fontSize:22,marginBottom:6}}>{ic}</div>
                    <div style={{fontFamily:'var(--font-head)',fontSize:28,fontWeight:800,color:c}}>{v}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{l}</div>
                  </div>
                ))}
              </div>
              <div className="glass" style={{borderRadius:'var(--r2)',padding:'24px',marginBottom:20}}>
                <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,marginBottom:18,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>🗓️ Upcoming Events</div>
                {[['01 JUL','Registration Deadline','11:59 PM IST · Online','chip-orange','Upcoming'],['18 JUL','Hackathon Kickoff 🚀','9:00 AM IST · KTPO + Online','chip-blue','48H Event'],['20 JUL','Demo Day & Results','3:00 PM IST · KTPO Auditorium','chip-green','Grand Finale']].map(([d,e,s,chip,t])=>(
                  <div key={e} style={{display:'flex',gap:12,alignItems:'center',padding:'12px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:10}}>
                    <div style={{textAlign:'center',background:'rgba(124,58,237,0.15)',borderRadius:8,padding:'6px 10px',minWidth:52,flexShrink:0}}>
                      <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:800,color:'var(--primary-light)'}}>{d.split(' ')[0]}</div>
                      <div style={{fontSize:9,color:'var(--text3)',fontWeight:700}}>{d.split(' ')[1]}</div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{e}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{s}</div>
                    </div>
                    <span className={`chip ${chip}`}>{t}</span>
                  </div>
                ))}
              </div>
              {myTeam&&(
                <div className="glass" style={{borderRadius:'var(--r2)',padding:'24px'}}>
                  <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,marginBottom:14}}>👥 Your Team: {myTeam.name}</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {myTeam.members.map(m=>(
                      <div key={m} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:13}}>
                        <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--primary),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{m[0].toUpperCase()}</div>
                        <span>{m}</span>
                        {m===myTeam.leader&&<span style={{fontSize:10,background:'rgba(251,191,36,0.2)',color:'#FBBF24',padding:'2px 6px',borderRadius:4,fontWeight:700}}>Leader</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
          {/* PROFILE */}
          {activePanel==='profile'&&(
            <div className="dash-panel">
              <div className="glass" style={{borderRadius:'var(--r2)',padding:'28px'}}>
                <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:700,marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>👤 Profile Information</div>
                <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:28}}>
                  <div style={{width:72,height:72,borderRadius:'50%',background:'linear-gradient(135deg,var(--primary),#F43F5E)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:800,fontFamily:'var(--font-head)'}}>{initials}</div>
                  <div>
                    <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:700}}>{user.fname} {user.lname||''}</div>
                    <div style={{fontSize:13,color:'var(--text2)'}}>{user.email}</div>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
                  {[['First Name','fname','text','First Name'],['Last Name','lname','text','Last Name'],['Email','email','email',user.email,true],['Phone','phone','tel','10-digit number'],['GitHub','github','text','github.com/username'],['LinkedIn','linkedin','text','linkedin.com/in/username']].map(([l,k,t,pl,ro])=>(
                    <div key={k}>
                      <label className="label">{l}</label>
                      <input className="input" type={t} value={pf[k]||''} onChange={e=>setPf(p=>({...p,[k]:e.target.value}))} placeholder={pl} readOnly={ro} style={ro?{opacity:.6,cursor:'not-allowed'}:{}}/>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:16}}>
                  <label className="label">Bio</label>
                  <textarea className="input" value={pf.bio||''} onChange={e=>setPf(p=>({...p,bio:e.target.value}))} rows={3} placeholder="Tell us about yourself..." style={{resize:'vertical'}}/>
                </div>
                <button className="btn btn-primary btn-sm" onClick={saveProfile}>Save Changes</button>
              </div>
            </div>
          )}
          {/* REGISTRATIONS */}
          {activePanel==='registrations'&&(
            <div className="dash-panel">
              <div className="glass" style={{borderRadius:'var(--r2)',padding:'28px'}}>
                <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:700,marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>🎟️ My Registrations</div>
                {myRegs.length===0?(
                  <div style={{textAlign:'center',padding:'48px 0',color:'var(--text3)'}}>
                    <div style={{fontSize:48,marginBottom:12}}>🎟️</div>
                    <p style={{marginBottom:16}}>No registrations yet.</p>
                    <button className="btn btn-primary btn-sm" onClick={()=>setPage('register')}>Register for HackNova →</button>
                  </div>
                ):myRegs.map(r=>(
                  <div key={r.id} style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'16px 20px',marginBottom:12,display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{r.fname} {r.lname}</div>
                      <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>Team: {r.team} · Track: {r.track||'General'}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Registered: {r.date} · Mode: {r.mode}</div>
                    </div>
                    <span className="chip chip-green">Confirmed ✓</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* WISHLIST */}
          {activePanel==='wishlist'&&(
            <div className="dash-panel">
              <div className="glass" style={{borderRadius:'var(--r2)',padding:'28px'}}>
                <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:700,marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>❤️ Wishlisted Tracks</div>
                {wishlist.length===0?(
                  <div style={{textAlign:'center',padding:'48px 0',color:'var(--text3)'}}>
                    <div style={{fontSize:48,marginBottom:12}}>🤍</div>
                    <p>No wishlisted tracks yet. Browse tracks and tap the heart.</p>
                  </div>
                ):(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    {wishlist.map(item=>{
                      const t = TRACKS.find(t=>t.id===item.id);
                      return (
                        <div key={item.id} style={{background:'var(--glass)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
                          <span style={{fontSize:26,width:36,textAlign:'center'}}>{t?.icon||'🎯'}</span>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:600}}>{item.name}</div>
                            <div style={{fontSize:11,color:'var(--text3)',textTransform:'capitalize'}}>{item.cat}</div>
                          </div>
                          <button onClick={()=>removeWish(item.id)} style={{background:'none',border:'none',color:'var(--text3)',fontSize:16,cursor:'pointer',padding:'0 4px'}} onMouseEnter={e=>e.target.style.color='#F43F5E'} onMouseLeave={e=>e.target.style.color='var(--text3)'}>✕</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}
          {/* TEAMS */}
          {activePanel==='teams'&&(
            <div className="dash-panel">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                <div className="glass" style={{borderRadius:'var(--r2)',padding:'24px'}}>
                  <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,marginBottom:18}}>Create a Team +</div>
                  <div style={{marginBottom:14}}><label className="label">Team Name</label><input className="input" value={newTeam.name} onChange={e=>setNewTeam(p=>({...p,name:e.target.value}))} placeholder="e.g. CodeCrusaders"/></div>
                  <div style={{marginBottom:14}}><label className="label">Track</label>
                    <select className="input" value={newTeam.track} onChange={e=>setNewTeam(p=>({...p,track:e.target.value}))}>
                      <option value="">Select Track</option>
                      {TRACKS.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:20}}><label className="label">Description</label><textarea className="input" value={newTeam.desc} onChange={e=>setNewTeam(p=>({...p,desc:e.target.value}))} rows={3} placeholder="What are you building?" style={{resize:'vertical'}}/></div>
                  <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={createTeam}>Create Team 🚀</button>
                </div>
                <div>
                  <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,marginBottom:14}}>Open Teams</div>
                  {teams.length===0?(
                    <div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)',fontSize:13}}>
                      <div style={{fontSize:40,marginBottom:10}}>👥</div>
                      No teams yet. Be the first!
                    </div>
                  ):(
                    <div style={{display:'flex',flexDirection:'column',gap:12}}>
                      {teams.map(t=>(
                        <div key={t.id} className="glass" style={{borderRadius:'var(--r)',padding:'16px'}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                            <div style={{fontFamily:'var(--font-head)',fontSize:14,fontWeight:700}}>{t.name}</div>
                            <span className="tag" style={{fontSize:11}}>{t.track||'General'}</span>
                          </div>
                          {t.desc&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>{t.desc}</div>}
                          <div style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>{t.members.length}/5 members</div>
                          {t.members.length<5&&!t.members.includes(user.email)?(
                            <button className="btn btn-outline btn-xs" style={{width:'100%',justifyContent:'center'}} onClick={()=>joinTeam(t.id)}>Join Team →</button>
                          ):t.members.includes(user.email)?(
                            <span className="chip chip-green">You're in this team</span>
                          ):<span className="chip chip-orange">Team Full</span>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
          {/* SETTINGS */}
          {activePanel==='settings'&&(
            <div className="dash-panel">
              <div className="glass" style={{borderRadius:'var(--r2)',padding:'28px'}}>
                <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:700,marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>⚙️ Settings</div>
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  {[['🔔','Email Notifications','Receive updates about HackNova via email',true],['📱','SMS Alerts','Get SMS reminders for important deadlines',false],['🌙','Dark Mode','Always on',true],['🌐','Public Profile','Make your profile visible to other hackers',true]].map(([ic,t,s,def])=>{
                    const [on,setOn] = useState(def);
                    return (
                      <div key={t} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px',background:'var(--glass)',border:'1px solid var(--border)',borderRadius:'var(--r)'}}>
                        <div style={{display:'flex',gap:12,alignItems:'center'}}>
                          <span style={{fontSize:20}}>{ic}</span>
                          <div><div style={{fontSize:14,fontWeight:600}}>{t}</div><div style={{fontSize:12,color:'var(--text3)'}}>{s}</div></div>
                        </div>
                        <button onClick={()=>setOn(!on)} style={{width:48,height:26,borderRadius:999,background:on?'var(--primary)':'var(--bg4)',border:'none',position:'relative',cursor:'pointer',transition:'background .2s'}}>
                          <div style={{width:20,height:20,borderRadius:'50%',background:'white',position:'absolute',top:3,left:on?25:3,transition:'left .2s'}}/>
                        </button>
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:24,paddingTop:20,borderTop:'1px solid var(--border)'}}>
                  <button className="btn btn-danger btn-sm" onClick={()=>{setUser(null);localStorage.removeItem('hn_user');setPage('home');notif('Account logged out','info');}}>Delete Account</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// ─── APP ROOT ─────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════
const App = () => {
  const [page,setPage] = useState('home');
  const [authOpen,setAuthOpen] = useState(false);
  const store = useStore();

  const handleLogin = u => {
    store.setUser(u);
    const savedProfile = JSON.parse(localStorage.getItem('hn_profile')||'null');
    if(savedProfile) store.setProfile(savedProfile);
  };
  const handleLogout = () => { store.setUser(null); localStorage.removeItem('hn_user'); };

  const commonProps = {
    user:store.user, wishlist:store.wishlist, setWishlist:store.setWishlist,
    teams:store.teams, setTeams:store.setTeams,
    registrations:store.registrations, setRegistrations:store.setRegistrations,
    onOpenAuth:()=>setAuthOpen(true), setPage
  };

  return (
    <NotifProvider>
      <Navbar page={page} setPage={setPage} user={store.user} onLogout={handleLogout} onOpenAuth={()=>setAuthOpen(true)}/>
      <div style={{paddingTop:page==='home'?0:0}}>
        {page==='home'&&<HomePage {...commonProps}/>}
        {page==='register'&&<RegisterPage registrations={store.registrations} setRegistrations={store.setRegistrations} setPage={setPage}/>}
        {page==='tracks'&&<TracksPage {...commonProps}/>}
        {page==='schedule'&&<SchedulePage/>}
        {page==='mentors'&&<MentorsPage/>}
        {page==='leaderboard'&&<LeaderboardPage/>}
        {page==='dashboard'&&<DashboardPage {...commonProps} profile={store.profile} setProfile={store.setProfile} setUser={store.setUser}/>}
      </div>
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)} onLogin={handleLogin} setPage={setPage}/>}
    </NotifProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
